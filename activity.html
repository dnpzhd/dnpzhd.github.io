
 <!DOCTYPE html>
 <html>
 <head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width">
   <title>2512活动</title>
  <style>
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(120deg, #f8fafc 0%, #e0e7ff 100%);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      color: #222;
    }
    a {
      display: inline-block;
      margin: 24px 0 0 24px;
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    a:hover {
      color: #4338ca;
      text-decoration: underline;
    }
    h2, h3 {
      text-align: center;
      margin-top: 32px;
      color: #3730a3;
    }
    form {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 24px auto 32px auto;
      max-width: 500px;
      background: #fff;
      padding: 24px 32px 20px 32px;
      border-radius: 16px;
      box-shadow: 0 4px 24px 0 rgba(99,102,241,0.08);
    }
    textarea {
      width: 100%;
      min-width: 300px;
      max-width: 100%;
      border: 1px solid #c7d2fe;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      margin-bottom: 16px;
      resize: vertical;
      background: #f1f5f9;
      transition: border 0.2s;
    }
    textarea:focus {
      border: 1.5px solid #6366f1;
      outline: none;
      background: #fff;
    }
    button[type="submit"] {
      background: linear-gradient(90deg, #6366f1 0%, #818cf8 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 2px 8px 0 rgba(99,102,241,0.10);
      transition: background 0.2s, box-shadow 0.2s;
    }
    button[type="submit"]:hover {
      background: linear-gradient(90deg, #4338ca 0%, #6366f1 100%);
      box-shadow: 0 4px 16px 0 rgba(99,102,241,0.18);
    }
    #postList {
      list-style: none;
      padding: 0;
      max-width: 700px;
      margin: 0 auto 40px auto;
    }
    #postList li {
      background: #fff;
      margin: 18px 0;
      padding: 18px 24px;
      border-radius: 12px;
      box-shadow: 0 2px 12px 0 rgba(99,102,241,0.07);
      word-break: break-all;
      font-size: 1.08rem;
      line-height: 1.7;
    }
    img, video, iframe {
      display: block;
      margin: 12px auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px 0 rgba(99,102,241,0.10);
    }
    @media (max-width: 600px) {
      form, #postList li {
        padding: 12px 8px;
      }
      form {
        max-width: 98vw;
      }
      img, video, iframe {
        max-width: 98vw !important;
        height: auto !important;
      }
    }
  </style>
 </head>
 <body>
 <a href="./index.html">返回</a>
 
 <h2>投稿区</h2>
 <form id="submitForm">
   <textarea id="content" rows="4" cols="50" placeholder="请输入你的投稿内容，可投图片和视频链接"></textarea><br>
   <button type="submit">提交</button>
 </form>
 
 <h3>投稿展示</h3>
 <ul id="postList"></ul>
 
 <script>
   const form = document.getElementById('submitForm');
   const content = document.getElementById('content');
   const postList = document.getElementById('postList');
 
   function parseContent(text) {
     // 匹配图片链接
     const imgRegex = /(https?:\/\/[^\s]+?\.(jpg|jpeg|png|gif))/gi;
     // 匹配视频链接
     const videoRegex = /(https?:\/\/[^\s]+?\.(mp4|webm|m3u8))/gi;
     // 匹配B站视频
     const biliRegex = /https?:\/\/www\.bilibili\.com\/video\/([a-zA-Z0-9]+)/gi;
     // 匹配YouTube视频
     const ytRegex = /https?:\/\/(?:www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/gi;
 
     let html = text
       .replace(imgRegex, url => `<br><img src="${url}" alt="图片" style="max-width:300px;"><br>`)
       .replace(videoRegex, url => `<br><video src="${url}" controls style="max-width:300px;"></video><br>`)
       .replace(biliRegex, (url, bv) =>
         `<br><iframe src="https://player.bilibili.com/player.html?bvid=${bv}&autoplay=0" allowfullscreen="true" style="width:300px;height:200px;" frameborder="0"></iframe><br>`
       )
       .replace(ytRegex, (url, vid) =>
         `<br><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen style="width:300px;height:200px;" frameborder="0"></iframe><br>`
       )
       .replace(/\n/g, '<br>');
     return html;
   }
 
   form.addEventListener('submit', function(e) {
     e.preventDefault();
     if(content.value.trim() !== "") {
       const li = document.createElement('li');
       li.innerHTML = parseContent(content.value);
       postList.appendChild(li);
       content.value = "";
     }
   });
 </script>
 
 </body>
 </html>
