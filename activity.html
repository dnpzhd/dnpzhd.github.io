<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>2512活动</title>
</head>
<body>
<a href="./index.html">返回</a>

<h2>投稿区</h2>
<form id="submitForm">
  <textarea id="content" rows="4" cols="50" placeholder="请输入你的投稿内容，可投图片和视频链接"></textarea><br>
  <button type="submit">提交</button>
</form>

<h3>投稿展示</h3>
<ul id="postList"></ul>

<script>
  const form = document.getElementById('submitForm');
  const content = document.getElementById('content');
  const postList = document.getElementById('postList');

  function parseContent(text) {
    // 匹配图片链接
    const imgRegex = /(https?:\/\/[^\s]+?\.(jpg|jpeg|png|gif))/gi;
    // 匹配视频链接
    const videoRegex = /(https?:\/\/[^\s]+?\.(mp4|webm|m3u8))/gi;
    // 匹配B站视频
    const biliRegex = /https?:\/\/www\.bilibili\.com\/video\/([a-zA-Z0-9]+)/gi;
    // 匹配YouTube视频
    const ytRegex = /https?:\/\/(?:www\.)?youtube\.com\/watch\?v=([a-zA-Z0-9_-]+)/gi;

    let html = text
      .replace(imgRegex, url => `<br><img src="${url}" alt="图片" style="max-width:300px;"><br>`)
      .replace(videoRegex, url => `<br><video src="${url}" controls style="max-width:300px;"></video><br>`)
      .replace(biliRegex, (url, bv) =>
        `<br><iframe src="https://player.bilibili.com/player.html?bvid=${bv}&autoplay=0" allowfullscreen="true" style="width:300px;height:200px;" frameborder="0"></iframe><br>`
      )
      .replace(ytRegex, (url, vid) =>
        `<br><iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen style="width:300px;height:200px;" frameborder="0"></iframe><br>`
      )
      .replace(/\n/g, '<br>');
    return html;
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if(content.value.trim() !== "") {
      const li = document.createElement('li');
      li.innerHTML = parseContent(content.value);
      postList.appendChild(li);
      content.value = "";
    }
  });
</script>

</body>
</html>
